<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vendor Credit Claims{% endblock %}</title>
  <script>
    // apply saved theme before first paint to avoid a flash of the light theme
    (function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_ver }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">MacGear · Credit Claims</a>
    <nav>
      <a href="/">Dashboard</a>
      <a class="btn" href="/promo/new">+ New Promotion</a>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
  <script>
    // dark-mode toggle: persists in localStorage, applied early in <head>
    (function(){
      var btn=document.getElementById('themeToggle');
      if(!btn)return;
      function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
      function paint(){btn.textContent=isDark()?'☀️':'🌙';btn.title=isDark()?'Switch to light mode':'Switch to dark mode';}
      paint();
      btn.addEventListener('click',function(){
        var dark=!isDark();
        if(dark)document.documentElement.setAttribute('data-theme','dark');
        else document.documentElement.removeAttribute('data-theme');
        try{localStorage.setItem('theme',dark?'dark':'light');}catch(e){}
        paint();
      });
    })();
  </script>
</body>
</html>
