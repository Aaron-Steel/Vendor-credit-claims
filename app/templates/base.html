<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vendor Credit Claims{% endblock %}</title>
  <script>
    // apply saved theme before first paint to avoid a flash of the light theme
    (function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
  </script>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_ver }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img class="brand-logo" src="/static/macgear-logo.png?v={{ asset_ver }}" alt="MacGear">
      <span class="brand-word">Promotions</span>
    </a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/help">Help</a>
      <a class="btn" href="/promo/new">+ New Promotion</a>
      <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
      {% if auth_enabled %}<a class="signout" href="/logout">Sign out</a>{% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- styled confirmation modal (replaces native confirm() for forms with data-confirm) -->
  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="confirmText">
      <p class="modal-text" id="confirmText"></p>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="confirmCancel">Cancel</button>
        <button type="button" class="btn danger-btn" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  {% block scripts %}{% endblock %}
  <script>
    // dark-mode toggle: persists in localStorage, applied early in <head>
    (function(){
      var btn=document.getElementById('themeToggle');
      if(!btn)return;
      function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
      function paint(){btn.textContent=isDark()?'☀️':'🌙';btn.title=isDark()?'Switch to light mode':'Switch to dark mode';}
      paint();
      btn.addEventListener('click',function(){
        var dark=!isDark();
        if(dark)document.documentElement.setAttribute('data-theme','dark');
        else document.documentElement.removeAttribute('data-theme');
        try{localStorage.setItem('theme',dark?'dark':'light');}catch(e){}
        paint();
      });
    })();

    // styled confirm modal: any <form data-confirm="message"> opens it instead of
    // the browser's confirm(). Confirming submits the form; cancelling does nothing.
    (function(){
      var overlay=document.getElementById('confirmModal');
      if(!overlay)return;
      var textEl=document.getElementById('confirmText');
      var okBtn=document.getElementById('confirmOk');
      var cancelBtn=document.getElementById('confirmCancel');
      var pending=null;
      function close(){overlay.hidden=true;pending=null;}
      function open(form){
        pending=form;
        textEl.textContent=form.getAttribute('data-confirm')||'Are you sure?';
        okBtn.textContent=form.getAttribute('data-confirm-ok')||'Delete';
        overlay.hidden=false;
        okBtn.focus();
      }
      document.addEventListener('submit',function(e){
        var form=e.target;
        if(form.matches&&form.matches('form[data-confirm]')){
          e.preventDefault();
          open(form);
        }
      });
      okBtn.addEventListener('click',function(){
        var f=pending;close();
        if(f)HTMLFormElement.prototype.submit.call(f); // bypass submit listener
      });
      cancelBtn.addEventListener('click',close);
      overlay.addEventListener('click',function(e){if(e.target===overlay)close();});
      document.addEventListener('keydown',function(e){if(e.key==='Escape'&&!overlay.hidden)close();});
    })();
  </script>
</body>
</html>
